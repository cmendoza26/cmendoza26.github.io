<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Time App</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>
    <header>
        <div style="display: flex; justify-content: center; align-items: center; flex-wrap: wrap;">
            <div style="text-align: center;">
                <h1>Global Time App</h1>
                <p>View current time across the world</p>
            </div>
        </div>
    </header>

    <main>
        <!-- Phase 1: City Selection & Display -->
        <section id="basic-section" class="section section-centered">
            <h2>Select a City</h2>
            <div class="control-group control-group-centered">
                <select id="city-select" aria-label="Select a city">
                    <option value="">-- Choose a city --</option>
                </select>
            </div>
            <div id="time-display" class="time-display">
                <div class="time-card">
                    <h3 id="current-city">Select a city</h3>
                    <div class="clock-container">
                        <canvas id="3d-clock" width="400" height="400"></canvas>
                    </div>
                    <div id="current-time" class="time-large">--:--:--</div>
                    <div id="current-timezone" class="timezone-info">Timezone: UTC</div>
                </div>
            </div>
        </section>

        <!-- Phase 2: Multi-city Management (shown by default) -->
        <section id="cities-section" class="section section-centered">
            <h2>My Cities</h2>
            <div class="control-group control-group-centered">
                <button id="add-city-btn" class="btn btn-primary">+ Add City</button>
                <button id="clear-all-btn" class="btn btn-secondary">Clear All</button>
            </div>
            <div id="cities-list" class="cities-list">
                <!-- City cards will be injected here -->
            </div>
        </section>
    </main>

    <footer>
        <button id="theme-toggle" class="btn btn-secondary" title="Toggle dark/light theme">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
    </footer>

    <!-- Toast notification container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/cities.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
